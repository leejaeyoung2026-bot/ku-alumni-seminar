<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>참석자 관리 — KU 약학대학 교우회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --crimson: #860029;
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-input: #1c1c1c;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-muted: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login ── */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .login-input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 2px;
    }

    .login-input:focus {
      border-color: var(--crimson);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--crimson);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .login-error {
      margin-top: 10px;
      font-size: 13px;
      color: #ff6b6b;
      min-height: 20px;
    }

    /* ── Admin Panel ── */
    .admin-wrap { display: none; }

    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.8; }

    .btn-primary { background: var(--crimson); color: white; }
    .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: #c0392b; color: white; }

    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }

    .stat-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
      min-width: 100px;
    }

    .stat-num {
      font-size: 24px;
      font-weight: 800;
      color: var(--crimson);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .table-wrap {
      overflow-x: auto;
      padding: 0 24px 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 640px;
    }

    thead tr {
      border-bottom: 2px solid var(--crimson);
    }

    th {
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:hover { background: var(--bg-card); }

    td {
      padding: 12px;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-dinner { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-no-dinner { background: rgba(239,68,68,0.15); color: #ef4444; }
    .badge-undecided { background: rgba(200,160,0,0.2); color: #e0b040; }

    .btn-del {
      padding: 4px 10px;
      background: none;
      border: 1px solid #c0392b;
      border-radius: 6px;
      color: #c0392b;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-del:hover { background: #c0392b; color: white; }

    /* ── Charts ── */
    .charts-section {
      display: none;
      gap: 20px;
      padding: 0 24px 20px;
      grid-template-columns: 1fr 1fr;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .donut-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .donut-svg {
      width: 160px;
      height: 160px;
      flex-shrink: 0;
    }

    .donut-svg circle {
      fill: none;
      stroke-width: 28;
      transform-origin: center;
      transition: stroke-dasharray 0.6s ease;
    }

    .donut-center {
      font-size: 28px;
      font-weight: 800;
      fill: var(--text);
    }

    .donut-center-label {
      font-size: 11px;
      fill: var(--text-muted);
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .legend-value {
      font-size: 15px;
      font-weight: 700;
      margin-left: auto;
      min-width: 32px;
      text-align: right;
    }

    /* Bar chart */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      font-size: 13px;
      color: var(--text-secondary);
      width: 50px;
      text-align: right;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 28px;
      background: var(--bg-input);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.6s ease;
      display: flex;
      align-items: center;
      padding-left: 10px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      min-width: fit-content;
    }

    .bar-count {
      font-size: 15px;
      font-weight: 700;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    @media (max-width: 700px) {
      .charts-section { grid-template-columns: 1fr; }
      .donut-wrap { flex-direction: column; gap: 20px; }
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">고려대 약학대학 교우회 세미나</div>
    <input type="password" class="login-input" id="adminKey" placeholder="관리자 키 입력" autocomplete="off">
    <button class="login-btn" id="loginBtn">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-wrap" id="adminWrap">
  <div class="header">
    <div>
      <div class="header-title">참석자 관리</div>
      <div class="header-sub">2026 고려대학교 약학대학 교우회 회사지부 세미나</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="btnRefresh">새로고침</button>
      <button class="btn btn-primary" id="btnCsv">CSV 다운로드</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">-</div>
      <div class="stat-label">총 참석자</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statDinner">-</div>
      <div class="stat-label">저녁 참석</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statNoDinner">-</div>
      <div class="stat-label">저녁 불참</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statUndecided">-</div>
      <div class="stat-label">저녁 미정</div>
    </div>
  </div>

  <div class="charts-section" id="chartsSection">
    <div class="chart-card">
      <div class="chart-title">저녁식사 참석 현황</div>
      <div class="donut-wrap">
        <svg class="donut-svg" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="70" stroke="rgba(255,255,255,0.08)" stroke-width="28" fill="none"/>
          <circle id="donutUndecided" cx="100" cy="100" r="70" stroke="#e0b040" stroke-dasharray="0 440" transform="rotate(-90 100 100)"/>
          <circle id="donutNoDinner" cx="100" cy="100" r="70" stroke="#ef4444" stroke-dasharray="0 440" transform="rotate(-90 100 100)"/>
          <circle id="donutDinner" cx="100" cy="100" r="70" stroke="#22c55e" stroke-dasharray="0 440" transform="rotate(-90 100 100)"/>
          <text class="donut-center" x="100" y="96" text-anchor="middle" id="donutTotal">0</text>
          <text class="donut-center-label" x="100" y="114" text-anchor="middle">전체</text>
        </svg>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:#22c55e"></div>
            <span class="legend-label">참석</span>
            <span class="legend-value" id="legendDinner">0</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:#ef4444"></div>
            <span class="legend-label">불참</span>
            <span class="legend-value" id="legendNoDinner">0</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:#e0b040"></div>
            <span class="legend-label">미정</span>
            <span class="legend-value" id="legendUndecided">0</span>
          </div>
        </div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">학번별 참석 현황</div>
      <div class="bar-chart" id="barChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">소속별 참석 현황</div>
      <div class="bar-chart" id="affiliationChart"></div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="loading" id="tableLoading">불러오는 중...</div>
    <table id="regTable" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>이름</th>
          <th>연락처</th>
          <th>학번</th>
          <th>소속</th>
          <th>저녁식사</th>
          <th>등록일시</th>
          <th>수정일시</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="regTbody"></tbody>
    </table>
    <div class="empty" id="tableEmpty" style="display:none;">등록된 참석자가 없습니다.</div>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const WORKER_URL = 'https://ku-seminar-api.leejaeyoung2026.workers.dev'; // e.g. https://ku-seminar-api.your-id.workers.dev

  let adminKey = '';

  // ── Login ────────────────────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('adminKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const key = document.getElementById('adminKey').value.trim();
    if (!key) return;

    document.getElementById('loginError').textContent = '확인 중...';

    try {
      const res = await fetch(`${WORKER_URL}/admin/list?key=${encodeURIComponent(key)}`);
      const data = await res.json();

      if (data.error === 'unauthorized') {
        document.getElementById('loginError').textContent = '키가 올바르지 않습니다.';
        return;
      }

      adminKey = key;
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      renderTable(data.records);
    } catch {
      document.getElementById('loginError').textContent = '서버 연결 실패. Worker URL을 확인해주세요.';
    }
  }

  // ── Load Data ────────────────────────────────────────────
  async function loadData() {
    document.getElementById('tableLoading').style.display = 'block';
    document.getElementById('regTable').style.display = 'none';
    document.getElementById('tableEmpty').style.display = 'none';

    const res = await fetch(`${WORKER_URL}/admin/list?key=${encodeURIComponent(adminKey)}`);
    const data = await res.json();
    renderTable(data.records);
  }

  function renderTable(records) {
    document.getElementById('tableLoading').style.display = 'none';

    const dinner = records.filter(r => r.dinner === '참석').length;
    const noDinner = records.filter(r => r.dinner === '불참').length;
    const undecided = records.filter(r => r.dinner === '미정').length;
    document.getElementById('statTotal').textContent = records.length;
    document.getElementById('statDinner').textContent = dinner;
    document.getElementById('statNoDinner').textContent = noDinner;
    document.getElementById('statUndecided').textContent = undecided;

    renderCharts(records, dinner, noDinner, undecided);

    if (!records.length) {
      document.getElementById('tableEmpty').style.display = 'block';
      return;
    }

    const tbody = document.getElementById('regTbody');
    tbody.innerHTML = records.map((r, i) => `
      <tr>
        <td style="color:var(--text-muted)">${i + 1}</td>
        <td><strong>${r.name}</strong></td>
        <td>${r.phone}</td>
        <td>${r.generation}학번</td>
        <td>${r.affiliation}</td>
        <td>
          <span class="badge ${r.dinner === '참석' ? 'badge-dinner' : r.dinner === '미정' ? 'badge-undecided' : 'badge-no-dinner'}">
            ${r.dinner}
          </span>
        </td>
        <td style="color:var(--text-secondary);font-size:12px">${r.registeredAt}</td>
        <td style="color:var(--text-muted);font-size:12px">${r.updatedAt || '-'}</td>
        <td>
          <button class="btn-del" onclick="deleteRecord('${r.phone}', '${r.name}')">삭제</button>
        </td>
      </tr>
    `).join('');

    document.getElementById('regTable').style.display = 'table';
  }

  // ── Charts ─────────────────────────────────────────────
  function renderCharts(records, dinner, noDinner, undecided) {
    const section = document.getElementById('chartsSection');
    if (!records.length) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'grid';

    const total = records.length;
    const C = 2 * Math.PI * 70; // ~439.8

    // Donut
    document.getElementById('donutTotal').textContent = total;
    document.getElementById('legendDinner').textContent = dinner;
    document.getElementById('legendNoDinner').textContent = noDinner;
    document.getElementById('legendUndecided').textContent = undecided;

    const dPct = dinner / total, nPct = noDinner / total, uPct = undecided / total;

    const dLen = dPct * C, nLen = nPct * C, uLen = uPct * C;

    const donutDinner = document.getElementById('donutDinner');
    donutDinner.setAttribute('stroke-dasharray', `${dLen} ${C - dLen}`);
    donutDinner.setAttribute('stroke-dashoffset', '0');

    const donutNoDinner = document.getElementById('donutNoDinner');
    donutNoDinner.setAttribute('stroke-dasharray', `${nLen} ${C - nLen}`);
    donutNoDinner.setAttribute('stroke-dashoffset', `${-dLen}`);

    const donutUndecided = document.getElementById('donutUndecided');
    donutUndecided.setAttribute('stroke-dasharray', `${uLen} ${C - uLen}`);
    donutUndecided.setAttribute('stroke-dashoffset', `${-(dLen + nLen)}`);

    // Bar chart — group by generation
    const genMap = {};
    records.forEach(r => {
      const g = r.generation || '?';
      if (!genMap[g]) genMap[g] = { total: 0, dinner: 0 };
      genMap[g].total++;
      if (r.dinner === '참석') genMap[g].dinner++;
    });

    const gens = Object.keys(genMap).sort((a, b) => Number(a) - Number(b));
    const maxCount = Math.max(...gens.map(g => genMap[g].total));

    document.getElementById('barChart').innerHTML = gens.map(g => {
      const d = genMap[g];
      const totalW = maxCount ? (d.total / maxCount * 100) : 0;
      const dinnerW = d.total ? (d.dinner / d.total * 100) : 0;
      return `
        <div class="bar-row">
          <div class="bar-label">${g}학번</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${totalW}%;background:linear-gradient(90deg, var(--crimson), #e07090)">
              <span style="opacity:0.9">${dinnerW > 0 ? Math.round(dinnerW) + '% 저녁' : ''}</span>
            </div>
          </div>
          <div class="bar-count">${d.total}</div>
        </div>`;
    }).join('');

    // Bar chart — group by affiliation
    const affMap = {};
    records.forEach(r => {
      const a = r.affiliation || '미입력';
      if (!affMap[a]) affMap[a] = 0;
      affMap[a]++;
    });
    const affs = Object.keys(affMap).sort((a, b) => affMap[b] - affMap[a]);
    const maxAff = Math.max(...affs.map(a => affMap[a]));
    document.getElementById('affiliationChart').innerHTML = affs.map(a => {
      const w = maxAff ? (affMap[a] / maxAff * 100) : 0;
      return `
        <div class="bar-row">
          <div class="bar-label">${a}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${w}%;background:linear-gradient(90deg,#6366f1,#a78bfa)"></div>
          </div>
          <div class="bar-count">${affMap[a]}</div>
        </div>`;
    }).join('');
  }

  // ── Delete ───────────────────────────────────────────────
  async function deleteRecord(phone, name) {
    if (!confirm(`${name}(${phone}) 을(를) 삭제할까요?`)) return;

    await fetch(`${WORKER_URL}/admin/delete?key=${encodeURIComponent(adminKey)}&phone=${encodeURIComponent(phone)}`);
    loadData();
  }

  // ── Buttons ──────────────────────────────────────────────
  document.getElementById('btnRefresh').addEventListener('click', loadData);

  document.getElementById('btnCsv').addEventListener('click', () => {
    window.open(`${WORKER_URL}/admin/csv?key=${encodeURIComponent(adminKey)}`, '_blank');
  });
</script>
</body>
</html>
